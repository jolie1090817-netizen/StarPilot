<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄羅斯方塊 - Tetris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a0033 100%);
            color: #fff;
        }

        .container {
            display: flex;
            gap: 30px;
            background: rgba(10, 14, 39, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 255, 255, 0.2);
            border: 2px solid #00ffff;
        }

        .game-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #ff00ff;
        }

        #gameBoard {
            display: grid;
            grid-template-columns: repeat(10, 30px);
            grid-template-rows: repeat(20, 30px);
            gap: 1px;
            background: #222;
            padding: 10px;
            border-radius: 5px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .cell {
            background: #0a0a0a;
            border: 1px solid #00ffff;
            transition: background-color 0.1s;
        }

        .cell.empty {
            background: #0a0a0a;
        }

        .cell.filled {
            background: #00ffff;
            box-shadow: inset -2px -2px 4px rgba(0, 0, 0, 0.5), inset 2px 2px 4px rgba(0, 255, 255, 0.5), 0 0 10px #00ffff;
        }

        .cell.i { background: #00ffff; box-shadow: 0 0 10px #00ffff; }
        .cell.o { background: #ffff00; box-shadow: 0 0 10px #ffff00; }
        .cell.t { background: #ff00ff; box-shadow: 0 0 10px #ff00ff; }
        .cell.s { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .cell.z { background: #ff0080; box-shadow: 0 0 10px #ff0080; }
        .cell.j { background: #ff6600; box-shadow: 0 0 10px #ff6600; }
        .cell.l { background: #0080ff; box-shadow: 0 0 10px #0080ff; }

        .controls-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-box {
            background: rgba(30, 30, 60, 0.8);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #00ffff;
            border: 2px solid #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .info-label {
            font-size: 12px;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px #00ffff;
        }

        .info-value {
            font-size: 28px;
            font-weight: bold;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #00ff00;
        }

        .next-piece {
            background: rgba(30, 30, 60, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .next-piece-grid {
            display: grid;
            grid-template-columns: repeat(4, 25px);
            gap: 2px;
            margin-top: 10px;
        }

        .next-piece-cell {
            width: 25px;
            height: 25px;
            background: #0a0a0a;
            border: 1px solid #00ffff;
            border-radius: 2px;
        }

        .next-piece-cell.filled {
            background: #00ffff;
            box-shadow: 0 0 8px #00ffff;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ffff 0%, #ff00ff 100%);
            color: #000;
            font-weight: bold;
            text-shadow: none;
        }

        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, #00ffff 0%, #ff00ff 100%);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6), 0 0 40px rgba(255, 0, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(0, 255, 255, 0.2);
            color: #00ffff;
            border: 2px solid #00ffff;
            flex: 1;
            min-width: 80px;
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .controls-hint {
            background: rgba(255, 0, 255, 0.1);
            padding: 12px;
            border-radius: 5px;
            font-size: 12px;
            color: #00ffff;
            border-left: 4px solid #ff00ff;
            border: 2px solid #ff00ff;
        }

        .controls-hint strong {
            display: block;
            margin-bottom: 8px;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        .key {
            background: rgba(0, 255, 255, 0.3);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New';
            margin: 2px;
            display: inline-block;
            border: 1px solid #00ffff;
            color: #00ffff;
        }

        .game-over-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .game-over-modal {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.1) 0%, rgba(255, 0, 255, 0.1) 100%);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.5), 0 0 80px rgba(255, 0, 255, 0.3);
            animation: popIn 0.3s ease-out;
            border: 2px solid #00ffff;
        }

        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .game-over-modal h2 {
            font-size: 36px;
            color: #ff00ff;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff00ff;
        }

        .game-over-modal p {
            font-size: 18px;
            color: #00ffff;
            margin-bottom: 10px;
        }

        .final-score {
            font-size: 32px;
            font-weight: bold;
            color: #00ff00;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 15px #00ff00;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                padding: 20px;
                gap: 20px;
            }

            #gameBoard {
                grid-template-columns: repeat(10, 25px);
                grid-template-rows: repeat(20, 25px);
            }

            .game-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-section">
            <div class="game-title">俄羅斯方塊</div>
            <div id="gameBoard"></div>
        </div>

        <div class="controls-section">
            <div class="info-box">
                <div class="info-label">分數</div>
                <div class="info-value" id="score">0</div>
            </div>

            <div class="info-box">
                <div class="info-label">消除行數</div>
                <div class="info-value" id="lines">0</div>
            </div>

            <div class="info-box">
                <div class="info-label">等級</div>
                <div class="info-value" id="level">1</div>
            </div>

            <div class="next-piece">
                <div class="info-label">下一個方塊</div>
                <div class="next-piece-grid" id="nextPieceGrid">
                    <div class="next-piece-cell"></div>
                    <div class="next-piece-cell"></div>
                    <div class="next-piece-cell"></div>
                    <div class="next-piece-cell"></div>
                    <div class="next-piece-cell"></div>
                    <div class="next-piece-cell"></div>
                    <div class="next-piece-cell"></div>
                    <div class="next-piece-cell"></div>
                    <div class="next-piece-cell"></div>
                    <div class="next-piece-cell"></div>
                    <div class="next-piece-cell"></div>
                    <div class="next-piece-cell"></div>
                    <div class="next-piece-cell"></div>
                    <div class="next-piece-cell"></div>
                    <div class="next-piece-cell"></div>
                    <div class="next-piece-cell"></div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-primary" id="startBtn">開始遊戲</button>
                <button class="btn-primary" id="pauseBtn" disabled>暫停</button>
            </div>

            <div class="controls-hint">
                <strong>控制方式：</strong>
                <div><span class="key">←</span> <span class="key">→</span> 移動</div>
                <div><span class="key">↓</span> 快速下降</div>
                <div><span class="key">SPACE</span> 旋轉</div>
                <div><span class="key">P</span> 暫停/繼續</div>
            </div>
        </div>
    </div>

    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-modal">
            <h2>遊戲結束！</h2>
            <p>最終分數</p>
            <div class="final-score" id="finalScore">0</div>
            <p id="finalStats"></p>
            <div class="modal-buttons">
                <button class="btn-primary" id="restartBtn">重新開始</button>
            </div>
        </div>
    </div>

    <script>
        // 遊戲常數
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;

        // 方塊定義
        const PIECES = {
            i: { shape: [[1,1,1,1]], color: 'i' },
            o: { shape: [[1,1],[1,1]], color: 'o' },
            t: { shape: [[0,1,0],[1,1,1]], color: 't' },
            s: { shape: [[0,1,1],[1,1,0]], color: 's' },
            z: { shape: [[1,1,0],[0,1,1]], color: 'z' },
            j: { shape: [[1,0,0],[1,1,1]], color: 'j' },
            l: { shape: [[0,0,1],[1,1,1]], color: 'l' }
        };

        class Tetris {
            constructor() {
                this.board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
                this.currentPiece = null;
                this.nextPiece = null;
                this.gameRunning = false;
                this.gamePaused = false;
                this.score = 0;
                this.lines = 0;
                this.level = 1;
                this.dropCounter = 0;
                this.dropInterval = 1000;
                this.lastTime = 0;

                this.initializeGame();
                this.setupEventListeners();
                this.createBoard();
            }

            initializeGame() {
                this.currentPiece = this.createNewPiece();
                this.nextPiece = this.createNewPiece();
            }

            createNewPiece() {
                const pieces = Object.keys(PIECES);
                const randomPiece = pieces[Math.floor(Math.random() * pieces.length)];
                const piece = PIECES[randomPiece];
                return {
                    shape: piece.shape,
                    color: piece.color,
                    x: Math.floor(COLS / 2) - 1,
                    y: 0
                };
            }

            setupEventListeners() {
                document.getElementById('startBtn').addEventListener('click', () => this.start());
                document.getElementById('pauseBtn').addEventListener('click', () => this.togglePause());
                document.getElementById('restartBtn').addEventListener('click', () => this.restart());

                document.addEventListener('keydown', (e) => {
                    if (!this.gameRunning) return;
                    
                    switch(e.key) {
                        case 'ArrowLeft':
                            e.preventDefault();
                            this.moveLeft();
                            break;
                        case 'ArrowRight':
                            e.preventDefault();
                            this.moveRight();
                            break;
                        case 'ArrowDown':
                            e.preventDefault();
                            this.moveDown();
                            break;
                        case ' ':
                            e.preventDefault();
                            this.rotate();
                            break;
                        case 'p':
                        case 'P':
                            e.preventDefault();
                            this.togglePause();
                            break;
                    }
                });
            }

            createBoard() {
                const gameBoard = document.getElementById('gameBoard');
                gameBoard.innerHTML = '';
                for (let i = 0; i < ROWS * COLS; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell empty';
                    cell.id = `cell-${i}`;
                    gameBoard.appendChild(cell);
                }
            }

            start() {
                if (this.gameRunning) return;
                this.gameRunning = true;
                this.gamePaused = false;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('pauseBtn').disabled = false;
                document.getElementById('gameOverOverlay').style.display = 'none';
                this.gameLoop(0);
            }

            togglePause() {
                if (!this.gameRunning) return;
                this.gamePaused = !this.gamePaused;
                document.getElementById('pauseBtn').textContent = this.gamePaused ? '繼續' : '暫停';
            }

            restart() {
                this.board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
                this.score = 0;
                this.lines = 0;
                this.level = 1;
                this.dropCounter = 0;
                this.updateUI();
                this.createBoard();
                this.initializeGame();
                this.start();
            }

            gameLoop(timestamp) {
                if (!this.gameRunning) return;

                const deltaTime = timestamp - this.lastTime;
                this.lastTime = timestamp;

                if (!this.gamePaused) {
                    this.dropCounter += deltaTime;

                    if (this.dropCounter >= this.dropInterval) {
                        this.dropCounter = 0;
                        if (!this.moveDown()) {
                            this.placePiece();
                            this.clearLines();
                            this.currentPiece = this.nextPiece;
                            this.nextPiece = this.createNewPiece();
                            this.updateNextPiece();

                            if (this.isColliding(this.currentPiece, this.currentPiece.x, this.currentPiece.y)) {
                                this.endGame();
                                return;
                            }
                        }
                    }
                }

                this.render();
                requestAnimationFrame((t) => this.gameLoop(t));
            }

            moveLeft() {
                if (!this.isColliding(this.currentPiece, this.currentPiece.x - 1, this.currentPiece.y)) {
                    this.currentPiece.x--;
                }
            }

            moveRight() {
                if (!this.isColliding(this.currentPiece, this.currentPiece.x + 1, this.currentPiece.y)) {
                    this.currentPiece.x++;
                }
            }

            moveDown() {
                if (!this.isColliding(this.currentPiece, this.currentPiece.x, this.currentPiece.y + 1)) {
                    this.currentPiece.y++;
                    return true;
                }
                return false;
            }

            rotate() {
                const rotated = this.rotatePiece(this.currentPiece.shape);
                if (!this.isColliding({ shape: rotated }, this.currentPiece.x, this.currentPiece.y)) {
                    this.currentPiece.shape = rotated;
                }
            }

            rotatePiece(shape) {
                const rows = shape.length;
                const cols = shape[0].length;
                const rotated = Array(cols).fill(null).map(() => Array(rows).fill(0));
                
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        rotated[c][rows - 1 - r] = shape[r][c];
                    }
                }
                return rotated;
            }

            isColliding(piece, x, y) {
                for (let r = 0; r < piece.shape.length; r++) {
                    for (let c = 0; c < piece.shape[r].length; c++) {
                        if (piece.shape[r][c]) {
                            const newX = x + c;
                            const newY = y + r;

                            if (newX < 0 || newX >= COLS || newY >= ROWS) return true;
                            if (newY >= 0 && this.board[newY][newX]) return true;
                        }
                    }
                }
                return false;
            }

            placePiece() {
                for (let r = 0; r < this.currentPiece.shape.length; r++) {
                    for (let c = 0; c < this.currentPiece.shape[r].length; c++) {
                        if (this.currentPiece.shape[r][c]) {
                            const x = this.currentPiece.x + c;
                            const y = this.currentPiece.y + r;
                            if (y >= 0) {
                                this.board[y][x] = this.currentPiece.color;
                            }
                        }
                    }
                }
            }

            clearLines() {
                let clearedLines = 0;
                for (let r = ROWS - 1; r >= 0; r--) {
                    if (this.board[r].every(cell => cell)) {
                        this.board.splice(r, 1);
                        this.board.unshift(Array(COLS).fill(0));
                        clearedLines++;
                    }
                }

                if (clearedLines > 0) {
                    this.lines += clearedLines;
                    this.score += clearedLines * clearedLines * 100;
                    this.level = Math.floor(this.lines / 10) + 1;
                    this.dropInterval = Math.max(100, 1000 - (this.level - 1) * 50);
                    this.updateUI();
                }
            }

            render() {
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const idx = r * COLS + c;
                        const cell = document.getElementById(`cell-${idx}`);
                        cell.className = 'cell';
                        if (this.board[r][c]) {
                            cell.classList.add('filled', this.board[r][c]);
                        } else {
                            cell.classList.add('empty');
                        }
                    }
                }

                // Draw current piece
                for (let r = 0; r < this.currentPiece.shape.length; r++) {
                    for (let c = 0; c < this.currentPiece.shape[r].length; c++) {
                        if (this.currentPiece.shape[r][c]) {
                            const x = this.currentPiece.x + c;
                            const y = this.currentPiece.y + r;
                            if (y >= 0 && y < ROWS && x >= 0 && x < COLS) {
                                const idx = y * COLS + x;
                                const cell = document.getElementById(`cell-${idx}`);
                                cell.classList.add('filled', this.currentPiece.color);
                            }
                        }
                    }
                }
            }

            updateNextPiece() {
                const cells = document.querySelectorAll('.next-piece-cell');
                cells.forEach(cell => cell.classList.remove('filled'));
                
                const offsetY = 2;
                const offsetX = 1;
                
                for (let r = 0; r < this.nextPiece.shape.length; r++) {
                    for (let c = 0; c < this.nextPiece.shape[r].length; c++) {
                        if (this.nextPiece.shape[r][c]) {
                            const idx = (r + offsetY) * 4 + (c + offsetX);
                            if (idx < cells.length) {
                                cells[idx].classList.add('filled');
                            }
                        }
                    }
                }
            }

            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('lines').textContent = this.lines;
                document.getElementById('level').textContent = this.level;
            }

            endGame() {
                this.gameRunning = false;
                document.getElementById('startBtn').disabled = false;
                document.getElementById('pauseBtn').disabled = true;
                document.getElementById('pauseBtn').textContent = '暫停';
                
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('finalStats').textContent = 
                    `消除行數: ${this.lines} | 等級: ${this.level}`;
                document.getElementById('gameOverOverlay').style.display = 'flex';
            }
        }

        // 遊戲初始化
        let game = new Tetris();
    </script>
</body>
</html>
