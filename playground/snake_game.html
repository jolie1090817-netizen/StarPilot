<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 貪食蛇遊戲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5em;
            background: linear-gradient(45deg, #00ff88, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .game-wrapper {
            position: relative;
            display: inline-block;
            margin: 20px 0;
        }

        canvas {
            display: block;
            background: radial-gradient(circle at 20% 50%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 255, 200, 0.1) 0%, transparent 50%),
                #0a0a0a;
            border: 3px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5),
                inset 0 0 20px rgba(0, 255, 136, 0.1);
        }

        .info {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-top: 20px;
            font-size: 1.2em;
        }

        .score-box,
        .level-box {
            background: rgba(0, 255, 136, 0.1);
            padding: 15px 25px;
            border-radius: 10px;
            border: 2px solid #00ff88;
            min-width: 150px;
        }

        .score-label,
        .level-label {
            font-size: 0.9em;
            color: #00ffcc;
            margin-bottom: 5px;
        }

        .score-value,
        .level-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #00ff88;
        }

        .controls {
            margin-top: 25px;
            padding: 20px;
            background: rgba(0, 255, 136, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            font-size: 1em;
            background: linear-gradient(45deg, #00ff88, #00ffcc);
            color: #0a0a0a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.5);
            background: linear-gradient(45deg, #00ffcc, #00ff88);
        }

        button:active {
            transform: translateY(0);
        }

        .controls p {
            font-size: 0.95em;
            color: #00ffcc;
            margin-bottom: 15px;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid #ff0000;
            z-index: 1000;
            display: none;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.5);
        }

        .game-over h2 {
            font-size: 2.5em;
            color: #ff0000;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        .game-over p {
            font-size: 1.3em;
            margin: 10px 0;
            color: #fff;
        }

        .game-over button {
            margin-top: 20px;
            background: linear-gradient(45deg, #ff0088, #ff0066);
        }

        .game-over button:hover {
            background: linear-gradient(45deg, #ff0066, #ff0088);
            box-shadow: 0 6px 20px rgba(255, 0, 136, 0.5);
        }

        .keyboard-hint {
            margin-top: 15px;
            font-size: 0.9em;
            color: #00cc99;
        }

        @keyframes glow {

            0%,
            100% {
                text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            }

            50% {
                text-shadow: 0 0 20px rgba(0, 255, 200, 0.8);
            }
        }

        h1 {
            animation: glow 2s ease-in-out infinite;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🐍 貪食蛇遊戲</h1>

        <div class="game-wrapper">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
        </div>

        <div class="info">
            <div class="score-box">
                <div class="score-label">分數</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="level-box">
                <div class="level-label">等級</div>
                <div class="level-value" id="level">1</div>
            </div>
        </div>

        <div class="controls">
            <p>⬆️ ⬅️ ⬇️ ➡️ 方向鍵控制 | 空白鍵暫停</p>
            <div class="button-group">
                <button id="startBtn" onclick="startGame()">開始遊戲</button>
                <button id="pauseBtn" onclick="togglePause()">暫停</button>
                <button onclick="resetGame()">重新開始</button>
            </div>
            <div class="keyboard-hint">
                💡 提示：按方向鍵移動，空白鍵暫停遊戲
            </div>
        </div>
    </div>

    <div class="game-over" id="gameOverModal">
        <h2>遊戲結束！</h2>
        <p>最終得分：<span id="finalScore">0</span></p>
        <p>達到等級：<span id="finalLevel">1</span></p>
        <button onclick="resetGame()">再玩一次</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 遊戲常數
        const GRID_SIZE = 20;
        const TILE_COUNT = canvas.width / GRID_SIZE;
        const INITIAL_SPEED = 100; // 毫秒

        // 遊戲狀態
        let gameState = {
            snake: [
                { x: 10, y: 10 }
            ],
            food: { x: 15, y: 15 },
            direction: { x: 1, y: 0 },
            nextDirection: { x: 1, y: 0 },
            score: 0,
            level: 1,
            gameRunning: false,
            gamePaused: false,
            speed: INITIAL_SPEED,
            foodEaten: 0
        };

        // 鍵盤事件處理
        document.addEventListener('keydown', handleKeyPress);

        function handleKeyPress(e) {
            const key = e.key;

            // 暫停功能
            if (key === ' ') {
                e.preventDefault();
                togglePause();
                return;
            }

            // 方向控制
            switch (key) {
                case 'ArrowUp':
                    e.preventDefault();
                    if (gameState.direction.y === 0) {
                        gameState.nextDirection = { x: 0, y: -1 };
                    }
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    if (gameState.direction.y === 0) {
                        gameState.nextDirection = { x: 0, y: 1 };
                    }
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    if (gameState.direction.x === 0) {
                        gameState.nextDirection = { x: -1, y: 0 };
                    }
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    if (gameState.direction.x === 0) {
                        gameState.nextDirection = { x: 1, y: 0 };
                    }
                    break;
            }
        }

        function startGame() {
            if (!gameState.gameRunning) {
                gameState.gameRunning = true;
                gameState.gamePaused = false;
                document.getElementById('startBtn').textContent = '進行中';
                gameLoop();
            }
        }

        function togglePause() {
            if (!gameState.gameRunning) return;

            gameState.gamePaused = !gameState.gamePaused;
            document.getElementById('pauseBtn').textContent = gameState.gamePaused ? '繼續' : '暫停';

            if (!gameState.gamePaused) {
                gameLoop();
            }
        }

        function resetGame() {
            gameState = {
                snake: [{ x: 10, y: 10 }],
                food: { x: 15, y: 15 },
                direction: { x: 1, y: 0 },
                nextDirection: { x: 1, y: 0 },
                score: 0,
                level: 1,
                gameRunning: false,
                gamePaused: false,
                speed: INITIAL_SPEED,
                foodEaten: 0
            };
            updateUI();
            draw();
            document.getElementById('startBtn').textContent = '開始遊戲';
            document.getElementById('pauseBtn').textContent = '暫停';
            document.getElementById('gameOverModal').style.display = 'none';
        }

        function gameLoop() {
            if (!gameState.gameRunning || gameState.gamePaused) return;

            update();
            draw();

            setTimeout(gameLoop, gameState.speed);
        }

        function update() {
            // 更新方向
            gameState.direction = gameState.nextDirection;

            // 計算新的頭部位置
            const head = gameState.snake[0];
            const newHead = {
                x: head.x + gameState.direction.x,
                y: head.y + gameState.direction.y
            };

            // 檢查碰撞（牆壁）
            if (newHead.x < 0 || newHead.x >= TILE_COUNT ||
                newHead.y < 0 || newHead.y >= TILE_COUNT) {
                endGame();
                return;
            }

            // 檢查碰撞（自己）
            if (gameState.snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
                endGame();
                return;
            }

            gameState.snake.unshift(newHead);

            // 檢查是否吃到食物
            if (newHead.x === gameState.food.x && newHead.y === gameState.food.y) {
                gameState.score += 10;
                gameState.foodEaten++;

                // 每吃5個食物，增加一個等級且速度提升
                if (gameState.foodEaten % 5 === 0) {
                    gameState.level++;
                    gameState.speed = Math.max(50, INITIAL_SPEED - (gameState.level - 1) * 10);
                }

                generateFood();
            } else {
                gameState.snake.pop();
            }

            updateUI();
        }

        function generateFood() {
            let newFood;
            let validPosition = false;

            while (!validPosition) {
                newFood = {
                    x: Math.floor(Math.random() * TILE_COUNT),
                    y: Math.floor(Math.random() * TILE_COUNT)
                };

                validPosition = !gameState.snake.some(
                    segment => segment.x === newFood.x && segment.y === newFood.y
                );
            }

            gameState.food = newFood;
        }

        function draw() {
            // 清空畫布
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 繪製網格線
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= TILE_COUNT; i++) {
                const pos = i * GRID_SIZE;
                ctx.beginPath();
                ctx.moveTo(pos, 0);
                ctx.lineTo(pos, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, pos);
                ctx.lineTo(canvas.width, pos);
                ctx.stroke();
            }

            // 繪製食物
            const foodX = gameState.food.x * GRID_SIZE;
            const foodY = gameState.food.y * GRID_SIZE;

            // 食物光暈效果
            const gradient = ctx.createRadialGradient(
                foodX + GRID_SIZE / 2, foodY + GRID_SIZE / 2, 2,
                foodX + GRID_SIZE / 2, foodY + GRID_SIZE / 2, GRID_SIZE
            );
            gradient.addColorStop(0, 'rgba(255, 0, 0, 0.6)');
            gradient.addColorStop(1, 'rgba(255, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(foodX - 5, foodY - 5, GRID_SIZE + 10, GRID_SIZE + 10);

            // 食物本體
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(foodX + GRID_SIZE / 2, foodY + GRID_SIZE / 2, GRID_SIZE / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            // 繪製蛇
            gameState.snake.forEach((segment, index) => {
                const x = segment.x * GRID_SIZE;
                const y = segment.y * GRID_SIZE;

                if (index === 0) {
                    // 蛇頭 - 綠色漸層
                    const headGradient = ctx.createLinearGradient(x, y, x + GRID_SIZE, y + GRID_SIZE);
                    headGradient.addColorStop(0, '#00ff88');
                    headGradient.addColorStop(1, '#00ffcc');
                    ctx.fillStyle = headGradient;
                } else {
                    // 蛇身 - 漸變綠色
                    const bodyColor = index % 2 === 0 ? '#00dd77' : '#00cc66';
                    ctx.fillStyle = bodyColor;
                }

                ctx.fillRect(x + 1, y + 1, GRID_SIZE - 2, GRID_SIZE - 2);

                // 邊框
                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 1;
                ctx.strokeRect(x + 1, y + 1, GRID_SIZE - 2, GRID_SIZE - 2);
            });
        }

        function updateUI() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;
        }

        function endGame() {
            gameState.gameRunning = false;
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('finalLevel').textContent = gameState.level;
            document.getElementById('gameOverModal').style.display = 'block';
            document.getElementById('startBtn').textContent = '開始遊戲';
        }

        // 初始化
        resetGame();
        draw();
    </script>
</body>

</html>
